[project]
name = "mplxe-cli"
version = "0.1.0"
description = "Command-line interface for the mplxe text normalization library."
requires-python = ">=3.12"
dependencies = [
    "mplxe-core",
    "typer>=0.12",
    "rich>=13.7",
]

[project.optional-dependencies]
pandas = ["pandas>=2.2"]
dev = [
    "pytest>=8.0",
    "pandas>=2.2",
]

[project.scripts]
mplxe = "mplxe_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mplxe_cli"]

[tool.uv.sources]
mplxe-core = { path = "../mplxe-core", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
