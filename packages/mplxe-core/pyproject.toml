[project]
name = "mplxe-core"
version = "0.2.0"
description = "Rule-based business text normalization core library"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mplxe"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
